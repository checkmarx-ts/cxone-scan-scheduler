on: 
    workflow_call:
      inputs:
        tag:
          description: 'The version tag string'
          required: true
          type: string
        prerelease:
          description: 'Set to true if publishing a pre-release.'
          required: true
          type: boolean
              
jobs:
  create-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Tag repo ${{ inputs.tag }}
        uses: richardsimko/update-tag@aab2434e9a5040687874aa39d1c6377ec0cb0d94
        with:
          tag_name: ${{ inputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
  publish-release:
    needs: [create-tag]
    uses: ./.github/workflows/build.yml
    with:
      tag: ${{ inputs.tag }}
      prerelease: ${{ inputs.prerelease }}

  remove-tag-on-failure:
    needs: [create-tag, publish-release]
    runs-on: ubuntu-latest
    if: ${{ failure() || cancelled() }}
    steps:
      - name: Fetch Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Remove CodeTag
        run: git push origin ':refs/tags/${{ inputs.tag }}'
    
        
    
  
  
    